# agent-ops — declarative harness config
# =======================================
# North-star orchestration layer (ROADMAP §3 layer ②, §4 M1) · the executor.
#
# Agent-ops takes ONE harness spec from the meta-agent and drives its lifecycle:
# dry-run validate → create/update → wait_ready → batch-invoke against a fixed dataset →
# report. All lifecycle actions go through the deterministic `harness_ops` MCP tool
# (never model-authored HTTP); harness_ops validates params and calls
# sentinel_harness.core.*. Agent-ops does NOT design specs and does NOT promote.
#
# Consumed by sentinel_harness.core.create_harness() via loader.load_harness_config().
# ${ENV} values are resolved by the loader from environment variables (12-factor):
#   SENTINEL_EXECUTION_ROLE_ARN, SENTINEL_REGION, AWS_PROFILE, SENTINEL_GATEWAY_ARN.

harnessName: sentinel_agent_ops   # must match [a-zA-Z][a-zA-Z0-9_]{0,39} — no hyphens

model:
  bedrockModelConfig:
    # Structured orchestration: build/modify + batch-test is deterministic multi-step
    # work, not deep research. Resolved from core.MODEL_SONNET (env SENTINEL_MODEL_SONNET).
    # Cross-region-inference pattern id — OVERRIDABLE: set SENTINEL_MODEL_SONNET to pin.
    modelId: global.anthropic.claude-sonnet-4-6
    maxTokens: 8192
    temperature: 0.1   # low — lifecycle execution should be repeatable, not creative

systemPrompt: system_prompt.md   # loader reads this file and wraps it as [{text: ...}]

tools:
  # Gateway: exposes the deterministic harness_ops MCP tool (harness lifecycle:
  # create / update / invoke / wait_ready / list / delete / create_endpoint). The agent
  # sends structured params; the handler calls sentinel_harness.core.*. See core.tool_gateway().
  - type: agentcore_gateway
    name: gateway
    config:
      agentCoreGateway:
        gatewayArn: ${SENTINEL_GATEWAY_ARN}

allowedTools:
  # EXPLICIT allowlist — never ['*']. Agent-ops' entire surface is the harness lifecycle
  # tool; it has no data-plane or research tools by design.
  - "@gateway/harness_ops"   # deterministic harness lifecycle (create/update/invoke/wait_ready/...)

memory:
  # SEMANTIC recall of prior build/test outcomes + SUMMARIZATION of the running build
  # session, so agent-ops learns which specs built cleanly (experience compounding).
  managedMemoryConfiguration:
    strategies:
      - SEMANTIC
      - SUMMARIZATION
    eventExpiryDuration: 90

maxIterations: 20      # dry-run → build → wait_ready → batch-invoke over the dataset → report
timeoutSeconds: 300    # build + wait_ready + batch test; long jobs go async
