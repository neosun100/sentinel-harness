name: release

# Cut a GitHub Release when a v* tag is pushed. Builds the sdist/wheel, generates a
# CycloneDX SBOM, attaches a SLSA build-provenance attestation, publishes to PyPI via
# OIDC Trusted Publishing (no long-lived token), and creates the GitHub Release with
# the matching CHANGELOG section as notes plus the artifacts + SBOM attached.
#
# Supply-chain posture:
#   - CycloneDX SBOM     : a machine-readable bill of materials for the built package,
#                          attached to the release so consumers can audit dependencies.
#   - SLSA provenance    : actions/attest-build-provenance signs the built artifacts
#                          (keyless, Sigstore) so their origin (this repo/workflow/commit)
#                          is cryptographically verifiable with `gh attestation verify`.
#   - PyPI OIDC publish  : pypa/gh-action-pypi-publish exchanges a short-lived OIDC token
#                          for the upload — NO API token stored in the repo. Requires a
#                          PyPI "trusted publisher" configured for this repo+workflow.

on:
  push:
    tags: ["v*"]

# Least privilege at the top; each job narrows/adds exactly what it needs.
permissions:
  contents: read

jobs:
  build:
    name: build + SBOM + provenance
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the GitHub Release + upload assets
      id-token: write        # keyless signing for the provenance attestation
      attestations: write    # record the SLSA build-provenance attestation
    outputs:
      version: ${{ steps.notes.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Smoke-test the built package
        run: |
          python -m pip install dist/*.whl
          SENTINEL_EXECUTION_ROLE_ARN=arn:aws:iam::000000000000:role/test sentinel --help
          python -c "import sentinel_harness; print(sentinel_harness.__version__)"

      - name: Generate CycloneDX SBOM
        # A CycloneDX SBOM of the project's declared dependency tree (resolved from
        # pyproject.toml). Attached to the release for downstream vuln/audit tooling.
        run: |
          python -m pip install cyclonedx-bom
          cyclonedx-py environment --output-format JSON -o sbom.cyclonedx.json
          echo "----- SBOM component count -----"
          python -c "import json;print(len(json.load(open('sbom.cyclonedx.json')).get('components',[])),'components')"

      - name: Attest SLSA build provenance for the artifacts
        # Keyless (Sigstore) provenance over the built dists — verifiable later with
        # `gh attestation verify dist/<file> --repo <owner>/<repo>`.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > release-notes.md
          echo "Extracted $(wc -l < release-notes.md) lines for $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/*
            sbom.cyclonedx.json
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload dist for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  pypi-publish:
    name: PyPI Trusted Publishing (OIDC)
    needs: build
    runs-on: ubuntu-latest
    # Only publish real releases to PyPI, never pre-releases (…-rc/-a/-b tags).
    if: ${{ !contains(github.ref_name, '-') }}
    environment:
      name: pypi
      url: https://pypi.org/project/sentinel-harness/
    permissions:
      id-token: write        # OIDC token exchanged for the PyPI upload — no stored token
    steps:
      - name: Download built dists
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (OIDC, tokenless)
        # Requires a PyPI trusted publisher configured for this repo + this workflow.
        # Until then this job fails loudly rather than silently skipping — that is the
        # intended gate (a release is not "done" until PyPI accepts the OIDC identity).
        uses: pypa/gh-action-pypi-publish@release/v1
