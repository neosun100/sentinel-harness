<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0c1220"/><stop offset="1" stop-color="#0a0e16"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffb445"/><stop offset="1" stop-color="#ff9900"/></linearGradient>
    <marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8b95a7"/></marker>
    <marker id="ac" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#00d0d6"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#ff9900"/></marker>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- title -->
  <text x="48" y="56" fill="#f5f5f7" font-size="30" font-weight="800">sentinel-harness · architecture</text>
  <text x="48" y="86" fill="#8b95a7" font-size="16" font-family="'JetBrains Mono',monospace">SecOps agents as configuration on Amazon Bedrock AgentCore Harness — three layers, zero orchestration code</text>

  <!-- ============ CALLERS + AUTH ============ -->
  <rect x="40" y="130" width="250" height="300" rx="16" fill="#101826" stroke="#1e2a3d"/>
  <text x="60" y="162" fill="#2997ff" font-size="17" font-weight="700">Callers &amp; Auth</text>
  <g font-size="13.5" fill="#d7dde7">
    <rect x="60" y="182" width="210" height="52" rx="9" fill="#0f1622" stroke="#2997ff"/>
    <text x="72" y="204">Humans →</text><text x="72" y="223" fill="#8b95a7" font-size="12">OAuth / JWT (customJWTAuthorizer)</text>
    <rect x="60" y="244" width="210" height="52" rx="9" fill="#0f1622" stroke="#1e2a3d"/>
    <text x="72" y="266">Services →</text><text x="72" y="285" fill="#8b95a7" font-size="12">SigV4 (IAM), no per-person map</text>
    <rect x="60" y="306" width="210" height="60" rx="9" fill="#0f1622" stroke="#30d158"/>
    <text x="72" y="328" fill="#30d158">Token Vault</text><text x="72" y="348" fill="#8b95a7" font-size="12">3rd-party API keys — agent</text><text x="72" y="362" fill="#8b95a7" font-size="12">never sees raw creds</text>
  </g>
  <text x="60" y="398" fill="#8b95a7" font-size="12">Execution role = least-privilege</text>
  <text x="60" y="414" fill="#8b95a7" font-size="12">scope to internal AWS resources</text>

  <!-- ============ TWO-PLANE API ============ -->
  <rect x="40" y="460" width="250" height="240" rx="16" fill="#101826" stroke="#1e2a3d"/>
  <text x="60" y="492" fill="#ff9900" font-size="17" font-weight="700">Two-plane API</text>
  <rect x="60" y="512" width="210" height="78" rx="9" fill="#0f1622" stroke="#2997ff"/>
  <text x="72" y="538" fill="#f5f5f7" font-size="15" font-weight="700">Control plane</text>
  <text x="72" y="559" fill="#8b95a7" font-size="12" font-family="'JetBrains Mono',monospace">bedrock-agentcore-control</text>
  <text x="72" y="578" fill="#8b95a7" font-size="12">Create / Update / Delete · versions</text>
  <rect x="60" y="600" width="210" height="78" rx="9" fill="#0f1622" stroke="#ff9900"/>
  <text x="72" y="626" fill="#f5f5f7" font-size="15" font-weight="700">Data plane (streaming)</text>
  <text x="72" y="647" fill="#8b95a7" font-size="12" font-family="'JetBrains Mono',monospace">bedrock-agentcore</text>
  <text x="72" y="666" fill="#8b95a7" font-size="12">InvokeHarness · RuntimeCommand</text>

  <!-- arrows callers/api -> harness -->
  <line x1="290" y1="300" x2="360" y2="360" stroke="#8b95a7" stroke-width="2" marker-end="url(#a)"/>
  <line x1="290" y1="620" x2="360" y2="520" stroke="#ff9900" stroke-width="2.5" marker-end="url(#ao)"/>

  <!-- ============ HARNESS RUNTIME (center) ============ -->
  <rect x="360" y="150" width="470" height="560" rx="20" fill="#0d1420" stroke="#30d158" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="595" y="184" fill="#30d158" font-size="16" font-weight="700" text-anchor="middle">Managed Harness · per-session Firecracker microVM</text>

  <!-- agent loop ring -->
  <text x="595" y="214" fill="#8b95a7" font-size="13" text-anchor="middle">Agent loop (declared as config; AWS runs it)</text>
  <g font-size="13" font-weight="600" text-anchor="middle">
    <rect x="440" y="230" width="130" height="46" rx="10" fill="#121a28" stroke="#00d0d6"/><text x="505" y="258" fill="#e7ecf3">reason</text>
    <rect x="620" y="230" width="130" height="46" rx="10" fill="#121a28" stroke="#00d0d6"/><text x="685" y="258" fill="#e7ecf3">select tool</text>
    <rect x="620" y="300" width="130" height="46" rx="10" fill="#121a28" stroke="#00d0d6"/><text x="685" y="328" fill="#e7ecf3">execute</text>
    <rect x="440" y="300" width="130" height="46" rx="10" fill="#121a28" stroke="#00d0d6"/><text x="505" y="328" fill="#e7ecf3">manage context</text>
  </g>
  <g stroke="#00d0d6" stroke-width="2" fill="none">
    <line x1="570" y1="253" x2="618" y2="253" marker-end="url(#ac)"/>
    <line x1="685" y1="276" x2="685" y2="298" marker-end="url(#ac)"/>
    <line x1="620" y1="323" x2="572" y2="323" marker-end="url(#ac)"/>
    <line x1="505" y1="298" x2="505" y2="278" marker-end="url(#ac)"/>
  </g>

  <!-- config fields -->
  <text x="595" y="382" fill="#ff9900" font-size="13" text-anchor="middle" font-family="'JetBrains Mono',monospace">model · systemPrompt · tools · skills · memory · limits</text>

  <!-- primitives row -->
  <g font-size="12.5" text-anchor="middle" font-family="'JetBrains Mono',monospace" fill="#8b95a7">
    <rect x="400" y="400" width="120" height="40" rx="8" fill="#101826" stroke="#1e2a3d"/><text x="460" y="424">Memory</text>
    <rect x="536" y="400" width="120" height="40" rx="8" fill="#101826" stroke="#1e2a3d"/><text x="596" y="424">Gateway/MCP</text>
    <rect x="672" y="400" width="140" height="40" rx="8" fill="#101826" stroke="#1e2a3d"/><text x="742" y="424">Browser·CodeIntp</text>
  </g>

  <!-- HITL + egress callouts -->
  <rect x="400" y="456" width="412" height="54" rx="10" fill="#241a12" stroke="#ff9900"/>
  <text x="416" y="478" fill="#ff9900" font-size="13" font-weight="700">Human-in-the-loop gate (inline_function)</text>
  <text x="416" y="498" fill="#d7dde7" font-size="12">pause → analyst approve/reject before publish / containment / offensive step</text>

  <rect x="400" y="522" width="412" height="54" rx="10" fill="#12261b" stroke="#30d158"/>
  <text x="416" y="544" fill="#30d158" font-size="13" font-weight="700">Egress control</text>
  <text x="416" y="564" fill="#d7dde7" font-size="12">web_search returns text only · no raw-download tool · VPC + NAT allowlist</text>

  <!-- multi-harness / supervisor -->
  <rect x="400" y="588" width="412" height="102" rx="10" fill="#101826" stroke="#bf5af2"/>
  <text x="416" y="610" fill="#bf5af2" font-size="13" font-weight="700">Multi-agent = multiple harnesses + supervisor</text>
  <g font-size="11.5" text-anchor="middle" fill="#d7dde7" font-family="'JetBrains Mono',monospace">
    <rect x="416" y="622" width="112" height="34" rx="7" fill="#0f1622" stroke="#bf5af2"/><text x="472" y="643">supervisor</text>
    <rect x="416" y="660" width="86" height="24" rx="6" fill="#0f1622" stroke="#1e2a3d"/><text x="459" y="676">research</text>
    <rect x="510" y="660" width="86" height="24" rx="6" fill="#0f1622" stroke="#1e2a3d"/><text x="553" y="676">detection</text>
    <rect x="604" y="660" width="86" height="24" rx="6" fill="#0f1622" stroke="#1e2a3d"/><text x="647" y="676">triage</text>
  </g>
  <text x="712" y="643" fill="#30d158" font-size="12" font-weight="700">≈2.6× parallel</text>

  <!-- arrow harness -> layers -->
  <line x1="830" y1="430" x2="900" y2="430" stroke="#8b95a7" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- ============ THREE SECURITY LAYERS (right) ============ -->
  <!-- Layer 1 -->
  <rect x="900" y="150" width="660" height="210" rx="16" fill="#101826" stroke="#2997ff"/>
  <text x="920" y="182" fill="#2997ff" font-size="18" font-weight="700">Layer 1 · Strategy Iteration</text>
  <text x="1520" y="182" fill="#30d158" font-size="12" text-anchor="end" font-family="'JetBrains Mono',monospace">■ built &amp; live-validated</text>
  <g font-size="13" fill="#d7dde7">
    <rect x="920" y="196" width="150" height="150" rx="9" fill="#0f1622" stroke="#1e2a3d"/><text x="936" y="220" font-weight="700">Research</text><text x="936" y="242" font-size="11.5" fill="#8b95a7">ATT&amp;CK · CVE lookup</text><text x="936" y="260" font-size="11.5" fill="#8b95a7">sample attribution</text><text x="936" y="278" font-size="11.5" fill="#8b95a7">threat hunting</text><text x="936" y="320" font-size="11.5" fill="#30d158">supervisor + specialists</text>
    <rect x="1085" y="196" width="150" height="150" rx="9" fill="#0f1622" stroke="#1e2a3d"/><text x="1101" y="220" font-weight="700">Detection gen</text><text x="1101" y="242" font-size="11.5" fill="#8b95a7">auto Sigma/YARA</text><text x="1101" y="260" font-size="11.5" fill="#8b95a7">adversarial review</text><text x="1101" y="278" font-size="11.5" fill="#8b95a7">human merge gate</text><text x="1101" y="320" font-size="11.5" fill="#30d158">generate ≠ evaluate</text>
    <rect x="1250" y="196" width="150" height="150" rx="9" fill="#0f1622" stroke="#1e2a3d"/><text x="1266" y="220" font-weight="700">Alert triage</text><text x="1266" y="242" font-size="11.5" fill="#8b95a7">TP/FP dispatch</text><text x="1266" y="260" font-size="11.5" fill="#8b95a7">correlate · respond</text><text x="1266" y="278" font-size="11.5" fill="#8b95a7">impact · HITL contain</text>
    <rect x="1415" y="196" width="130" height="150" rx="9" fill="#0f1622" stroke="#1e2a3d"/><text x="1431" y="220" font-weight="700">Feedback</text><text x="1431" y="242" font-size="11.5" fill="#8b95a7">verdicts →</text><text x="1431" y="260" font-size="11.5" fill="#8b95a7">Memory facts/</text><text x="1431" y="278" font-size="11.5" fill="#8b95a7">{actor}</text><text x="1431" y="320" font-size="11.5" fill="#00d0d6">↺ closes loop</text>
  </g>

  <!-- Layer 2 -->
  <rect x="900" y="378" width="660" height="150" rx="16" fill="#101826" stroke="#fbbf24"/>
  <text x="920" y="410" fill="#fbbf24" font-size="18" font-weight="700">Layer 2 · Simulation</text>
  <text x="1520" y="410" fill="#fbbf24" font-size="12" text-anchor="end" font-family="'JetBrains Mono',monospace">□ designed · long-running Runtime</text>
  <g font-size="13" fill="#d7dde7">
    <rect x="920" y="424" width="200" height="88" rx="9" fill="#0f1622" stroke="#1e2a3d"/><text x="936" y="448" font-weight="700">BAS / attack-path</text><text x="936" y="470" font-size="11.5" fill="#8b95a7">async long task · checkpoint</text><text x="936" y="488" font-size="11.5" fill="#8b95a7">self-restart at session cap</text>
    <rect x="1135" y="424" width="200" height="88" rx="9" fill="#0f1622" stroke="#1e2a3d"/><text x="1151" y="448" font-weight="700">Adversary emulation</text><text x="1151" y="470" font-size="11.5" fill="#8b95a7">Play Mode</text><text x="1151" y="488" font-size="11.5" fill="#ff9900">every step human-confirmed</text>
    <rect x="1350" y="424" width="195" height="88" rx="9" fill="#0f1622" stroke="#1e2a3d"/><text x="1366" y="448" font-weight="700">Memory across restarts</text><text x="1366" y="470" font-size="11.5" fill="#8b95a7">case context persists</text><text x="1366" y="488" font-size="11.5" fill="#8b95a7">even after microVM cycles</text>
  </g>

  <!-- Layer 3 -->
  <rect x="900" y="546" width="660" height="164" rx="16" fill="#101826" stroke="#bf5af2"/>
  <text x="920" y="578" fill="#bf5af2" font-size="18" font-weight="700">Layer 3 · Foundation</text>
  <g font-size="12.5" fill="#d7dde7">
    <rect x="920" y="592" width="150" height="104" rx="9" fill="#0f1622" stroke="#1e2a3d"/><text x="936" y="616" font-weight="700">Sandbox</text><text x="936" y="637" font-size="11" fill="#8b95a7">microVM/session</text><text x="936" y="654" font-size="11" fill="#8b95a7">PreToolUse hooks</text><text x="936" y="671" font-size="11" fill="#8b95a7">path/cmd allowlist</text>
    <rect x="1085" y="592" width="150" height="104" rx="9" fill="#0f1622" stroke="#1e2a3d"/><text x="1101" y="616" font-weight="700">Self-iteration</text><text x="1101" y="637" font-size="11" fill="#8b95a7">Agent Factory</text><text x="1101" y="654" font-size="11" fill="#8b95a7">test→stg→prod</text><text x="1101" y="671" font-size="11" fill="#8b95a7">versioned endpoints</text>
    <rect x="1250" y="592" width="150" height="104" rx="9" fill="#0f1622" stroke="#1e2a3d"/><text x="1266" y="616" font-weight="700">AI coding</text><text x="1266" y="637" font-size="11" fill="#8b95a7">LiteLLM gateway</text><text x="1266" y="654" font-size="11" fill="#8b95a7">enterprise MCP</text><text x="1266" y="671" font-size="11" fill="#8b95a7">semantic tool search</text>
    <rect x="1415" y="592" width="130" height="104" rx="9" fill="#0f1622" stroke="#1e2a3d"/><text x="1431" y="616" font-weight="700">cyber-skills</text><text x="1431" y="637" font-size="11" fill="#8b95a7">S3 SKILL.md</text><text x="1431" y="654" font-size="11" fill="#8b95a7">central registry</text><text x="1431" y="671" font-size="11" fill="#8b95a7">governed</text>
  </g>

  <!-- footer note -->
  <text x="48" y="756" fill="#8b95a7" font-size="13">No lock-in: when config isn't enough, <tspan fill="#ff9900" font-family="'JetBrains Mono',monospace">agentcore export harness</tspan> emits editable Strands code on the same compute / observability / identity.</text>
  <text x="48" y="784" fill="#5a6677" font-size="12" font-family="'JetBrains Mono',monospace">Patterns borrowed from AWS samples: pluggable-agentic-ai-framework · long-running-app-harness · serverless-image-editing-harness · agentic-chatbot-accelerator</text>
</svg>
