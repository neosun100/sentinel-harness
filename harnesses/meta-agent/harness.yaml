# meta-agent — declarative harness config
# ========================================
# North-star orchestration layer (ROADMAP §3 layer ①, §5.2) · "agent builds agents".
#
# The meta-agent decomposes a normalized development request into ONE valid harness spec
# (a strict harness.yaml structure) and hands it to agent-ops. Generation is deliberately
# separate from execution: the meta-agent emits a spec, it NEVER builds/tests a harness
# itself. That separation is what keeps the self-iteration loop auditable.
#
# Consumed by sentinel_harness.core.create_harness() via loader.load_harness_config().
# ${ENV} values are resolved by the loader from environment variables (12-factor):
#   SENTINEL_EXECUTION_ROLE_ARN, SENTINEL_REGION, AWS_PROFILE, SENTINEL_GATEWAY_ARN
# and the SENTINEL_MODEL_* overrides consumed by core.py.

harnessName: sentinel_meta_agent   # must match [a-zA-Z][a-zA-Z0-9_]{0,39} — no hyphens

model:
  bedrockModelConfig:
    # Deep reasoning: decomposing a request into a correct, least-privilege spec is a
    # planning task. Resolved from core.MODEL_OPUS (env SENTINEL_MODEL_OPUS).
    # Cross-region-inference pattern id — OVERRIDABLE: set SENTINEL_MODEL_OPUS to pin.
    modelId: us.anthropic.claude-opus-4-5-20251101-v1:0
    maxTokens: 8192
    temperature: 0.2

systemPrompt: system_prompt.md   # loader reads this file and wraps it as [{text: ...}]

allowedTools:
  # EXPLICIT allowlist — never ['*']. The meta-agent only intakes a request and emits a
  # spec; it must NOT be able to build/modify/invoke a harness (that is agent-ops).
  # These are LOGICAL tool names; they are wired via the Gateway later (see README) — the
  # meta-agent's whole surface is "read the intake, emit the spec".
  - emit_harness_spec   # record the finished harness spec + hand it to agent-ops

memory:
  # SEMANTIC recall of prior specs / model+tool choices that worked, + SUMMARIZATION of
  # the running request so experience compounds across builds (ROADMAP §3: "write Memory
  # throughout — experience compounding").
  managedMemoryConfiguration:
    strategies:
      - SEMANTIC
      - SUMMARIZATION
    eventExpiryDuration: 90

maxIterations: 12      # decompose → choose model/tools → emit one spec; no fan-out
timeoutSeconds: 120    # spec emission is fast; well under the harness sync ceiling
