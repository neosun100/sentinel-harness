name: docs

# Build the API reference with pdoc (pure docstrings — no config, no source edits)
# and publish it to GitHub Pages. Runs on pushes to main that touch the library or
# this workflow, and can be dispatched manually. The build job is also exercised on
# PRs (without deploying) so a docstring/import break is caught before merge.

on:
  push:
    branches: [main]
    paths:
      - "sentinel_harness/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "sentinel_harness/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least privilege; the deploy job adds pages/id-token write.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build API reference (pdoc)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        # actions/setup-python v6.3.0
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install the package + pdoc
        # Install the library so pdoc can import it (boto3/pyyaml come as deps).
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pdoc

      - name: Render the API reference
        # Dummy, non-secret env so importing sentinel_harness.core never resolves a
        # real region/role/creds. pdoc masks any default that matches an env var.
        env:
          SENTINEL_EXECUTION_ROLE_ARN: "arn:aws:iam::000000000000:role/docs-build"
          AWS_DEFAULT_REGION: "us-east-1"
          AWS_ACCESS_KEY_ID: "docs"
          AWS_SECRET_ACCESS_KEY: "docs"
        run: |
          pdoc sentinel_harness -o site \
            --docformat numpy \
            --logo-link "https://github.com/neosun100/sentinel-harness"
          test -f site/index.html
          echo "----- rendered pages -----"; ls site/sentinel_harness/

      - name: Upload Pages artifact
        # actions/upload-pages-artifact v5.0.0 (Node 24 — clears the Node 20 deprecation warning)
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: site

  deploy:
    name: deploy to GitHub Pages
    # Only publish from main — PRs build (above) but never deploy.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write        # publish to Pages
      id-token: write     # OIDC identity the Pages deploy verifies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        # actions/deploy-pages v5.0.0 (Node 24 — clears the Node 20 deprecation warning)
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
