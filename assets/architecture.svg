<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" font-family="Inter,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-label="sentinel-harness architecture on Amazon Bedrock AgentCore">
  <title>sentinel-harness — architecture on Amazon Bedrock AgentCore</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1018"/><stop offset="1" stop-color="#0a0e16"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb445"/><stop offset="1" stop-color="#ff9900"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/><stop offset="1" stop-color="#0a84ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#30d158"/><stop offset="1" stop-color="#00d0d6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#7bdcff"/></marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#48e08a"/></marker>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 190 H1280 M0 380 H1280 M0 570 H1280"/>
    <path d="M320 0 V760 M640 0 V760 M960 0 V760"/>
  </g>

  <text x="40" y="52" fill="#e8ecf4" font-size="27" font-weight="700">sentinel-harness</text>
  <text x="40" y="76" fill="#9aa4bd" font-size="14.5">Production SecOps agents, built as configuration — on Amazon Bedrock AgentCore Harness</text>
  <text x="1240" y="52" fill="#ff9900" font-size="13" font-weight="700" text-anchor="end">M0–M7 delivered · 1475 offline tests · CI green</text>
  <text x="1240" y="72" fill="#9aa4bd" font-size="12" text-anchor="end">Registry + AgentCore Runtime live-validated on a non-prod account</text>

  <!-- CALLERS -->
  <g>
    <rect x="40" y="110" width="220" height="150" rx="14" fill="#111725" stroke="#243247" stroke-width="1.5"/>
    <text x="150" y="136" fill="#7bdcff" font-size="12.5" font-weight="700" text-anchor="middle">CALLERS</text>
    <rect x="60" y="150" width="180" height="42" rx="9" fill="#0e1524" stroke="#2b3a52"/>
    <text x="150" y="170" fill="#e8ecf4" font-size="13" text-anchor="middle" font-weight="600">Humans</text>
    <text x="150" y="185" fill="#9aa4bd" font-size="11" text-anchor="middle">OAuth / JWT (aud claim)</text>
    <rect x="60" y="200" width="180" height="42" rx="9" fill="#0e1524" stroke="#2b3a52"/>
    <text x="150" y="220" fill="#e8ecf4" font-size="13" text-anchor="middle" font-weight="600">Services (M2M)</text>
    <text x="150" y="235" fill="#9aa4bd" font-size="11" text-anchor="middle">SigV4 / client_credentials</text>
  </g>

  <!-- TWO-PLANE API -->
  <g>
    <rect x="300" y="96" width="250" height="182" rx="14" fill="#0e1626" stroke="url(#cyan)" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="425" y="120" fill="#7bdcff" font-size="12.5" font-weight="700" text-anchor="middle">TWO-PLANE API</text>
    <rect x="318" y="132" width="214" height="58" rx="10" fill="#101d31" stroke="#2f4a68"/>
    <text x="425" y="154" fill="#e8ecf4" font-size="13.5" text-anchor="middle" font-weight="700">bedrock-agentcore-control</text>
    <text x="425" y="173" fill="#9aa4bd" font-size="11" text-anchor="middle">lifecycle · create / update / delete</text>
    <rect x="318" y="198" width="214" height="58" rx="10" fill="#101d31" stroke="#2f4a68"/>
    <text x="425" y="220" fill="#e8ecf4" font-size="13.5" text-anchor="middle" font-weight="700">bedrock-agentcore</text>
    <text x="425" y="239" fill="#9aa4bd" font-size="11" text-anchor="middle">data · invoke / stream / HITL resume</text>
  </g>

  <path d="M260 185 H300" stroke="url(#cyan)" stroke-width="2.5" fill="none" marker-end="url(#ah)" stroke-dasharray="7 7">
    <animate attributeName="stroke-dashoffset" values="28;0" dur="0.9s" repeatCount="indefinite"/>
  </path>

  <!-- MANAGED HARNESS -->
  <g>
    <rect x="600" y="96" width="360" height="300" rx="16" fill="#0f1522" stroke="url(#orange)" stroke-opacity="0.55" stroke-width="2"/>
    <text x="780" y="120" fill="#ffb445" font-size="13" font-weight="700" text-anchor="middle">MANAGED HARNESS · per-session Firecracker microVM</text>

    <g transform="translate(690 250)">
      <circle r="60" fill="none" stroke="url(#orange)" stroke-opacity="0.35" stroke-width="3" stroke-dasharray="8 12">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      </circle>
      <circle r="6" cx="0" cy="-60" fill="#ff9900" filter="url(#soft)">
        <animateMotion dur="5s" repeatCount="indefinite" rotate="auto" path="M0 -60 A60 60 0 1 1 -0.1 -60 Z"/>
      </circle>
      <text y="-4" fill="#e8ecf4" font-size="12.5" font-weight="700" text-anchor="middle">agent</text>
      <text y="13" fill="#9aa4bd" font-size="11" text-anchor="middle">loop</text>
    </g>

    <g font-size="11">
      <rect x="770" y="150" width="82" height="34" rx="8" fill="#141c2c" stroke="#2b3a52"/><text x="811" y="171" fill="#cdd6e6" text-anchor="middle">Memory</text>
      <rect x="862" y="150" width="82" height="34" rx="8" fill="#141c2c" stroke="#2b3a52"/><text x="903" y="171" fill="#cdd6e6" text-anchor="middle">Gateway</text>
      <rect x="770" y="192" width="82" height="34" rx="8" fill="#141c2c" stroke="#2b3a52"/><text x="811" y="213" fill="#cdd6e6" text-anchor="middle">Browser</text>
      <rect x="862" y="192" width="82" height="34" rx="8" fill="#141c2c" stroke="#2b3a52"/><text x="903" y="213" fill="#cdd6e6" text-anchor="middle">Code Intp</text>
      <rect x="770" y="234" width="174" height="34" rx="8" fill="#161226" stroke="#5b4a86"/><text x="857" y="255" fill="#d9ccff" text-anchor="middle">inline_function — HITL gate</text>
      <rect x="770" y="276" width="174" height="34" rx="8" fill="#101d17" stroke="#2f5a3f"/><text x="857" y="297" fill="#bfead0" text-anchor="middle">egress control (default-deny)</text>
    </g>

    <text x="780" y="336" fill="#9aa4bd" font-size="11.5" text-anchor="middle">multi-harness + supervisor · ≈2.6× parallel speedup</text>
    <g>
      <circle cx="700" cy="360" r="8" fill="url(#orange)"/><circle cx="740" cy="360" r="8" fill="url(#orange)"/>
      <circle cx="780" cy="360" r="8" fill="url(#orange)"/><circle cx="820" cy="360" r="8" fill="url(#orange)"/>
      <circle cx="860" cy="360" r="11" fill="url(#purple)"/><text x="860" y="385" fill="#c9b8ff" font-size="10" text-anchor="middle">supervisor</text>
    </g>
  </g>

  <path d="M550 165 H600" stroke="url(#cyan)" stroke-width="2.5" fill="none" marker-end="url(#ah)" stroke-dasharray="7 7">
    <animate attributeName="stroke-dashoffset" values="28;0" dur="0.9s" repeatCount="indefinite"/>
  </path>
  <path d="M600 210 H550" stroke="url(#green)" stroke-width="2.5" fill="none" marker-end="url(#ahg)" stroke-dasharray="7 7">
    <animate attributeName="stroke-dashoffset" values="0;28" dur="0.9s" repeatCount="indefinite"/>
  </path>

  <!-- IDENTITY / SECRETS -->
  <g>
    <rect x="40" y="300" width="220" height="120" rx="14" fill="#111725" stroke="#243247" stroke-width="1.5"/>
    <text x="150" y="326" fill="#c9b8ff" font-size="12.5" font-weight="700" text-anchor="middle">IDENTITY &amp; SECRETS</text>
    <text x="150" y="352" fill="#e8ecf4" font-size="12" text-anchor="middle">Cognito CUSTOM_JWT</text>
    <text x="150" y="372" fill="#9aa4bd" font-size="11" text-anchor="middle">human aud · M2M client_id</text>
    <text x="150" y="396" fill="#9aa4bd" font-size="11" text-anchor="middle">token vault (no raw creds)</text>
  </g>
  <path d="M150 300 V278 H300" stroke="url(#purple)" stroke-width="2" fill="none" marker-end="url(#ah)" stroke-opacity="0.7" stroke-dasharray="6 8">
    <animate attributeName="stroke-dashoffset" values="28;0" dur="1.1s" repeatCount="indefinite"/>
  </path>

  <!-- THREE SECOPS LAYERS -->
  <g>
    <rect x="1000" y="96" width="240" height="300" rx="16" fill="#0e1626" stroke="#243247" stroke-width="1.5"/>
    <text x="1120" y="120" fill="#7bdcff" font-size="12.5" font-weight="700" text-anchor="middle">THREE SECOPS LAYERS</text>

    <rect x="1018" y="134" width="204" height="76" rx="10" fill="#12202f" stroke="url(#cyan)" stroke-opacity="0.4"/>
    <text x="1120" y="156" fill="#e8ecf4" font-size="13" font-weight="700" text-anchor="middle">L1 · Strategy</text>
    <text x="1120" y="176" fill="#9aa4bd" font-size="10.5" text-anchor="middle">CVE triage · detection-gen</text>
    <text x="1120" y="192" fill="#9aa4bd" font-size="10.5" text-anchor="middle">alert triage · feedback loop</text>

    <rect x="1018" y="218" width="204" height="76" rx="10" fill="#161226" stroke="url(#purple)" stroke-opacity="0.4"/>
    <text x="1120" y="240" fill="#e8ecf4" font-size="13" font-weight="700" text-anchor="middle">L2 · Simulation</text>
    <text x="1120" y="260" fill="#9aa4bd" font-size="10.5" text-anchor="middle">Play Mode · BAS replay</text>
    <text x="1120" y="276" fill="#9aa4bd" font-size="10.5" text-anchor="middle">detonation (simulated no-op)</text>

    <rect x="1018" y="302" width="204" height="80" rx="10" fill="#101d17" stroke="url(#green)" stroke-opacity="0.4"/>
    <text x="1120" y="324" fill="#e8ecf4" font-size="13" font-weight="700" text-anchor="middle">L3 · Foundation</text>
    <text x="1120" y="344" fill="#9aa4bd" font-size="10.5" text-anchor="middle">registry · sandbox · factory</text>
    <text x="1120" y="360" fill="#9aa4bd" font-size="10.5" text-anchor="middle">IaC: CDK (9) + Terraform</text>
    <text x="1120" y="376" fill="#9aa4bd" font-size="10.5" text-anchor="middle">Guardrail · Identity · Obs</text>
  </g>
  <path d="M960 220 H1000" stroke="url(#cyan)" stroke-width="2.5" fill="none" marker-end="url(#ah)" stroke-dasharray="7 7">
    <animate attributeName="stroke-dashoffset" values="28;0" dur="0.9s" repeatCount="indefinite"/>
  </path>

  <!-- AGENT-BUILDS-AGENTS LOOP -->
  <g>
    <rect x="40" y="452" width="1200" height="128" rx="16" fill="#0f1522" stroke="url(#orange)" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="60" y="478" fill="#ffb445" font-size="13" font-weight="700">NORTH STAR · agent-builds-agents self-iteration loop</text>
    <text x="60" y="497" fill="#9aa4bd" font-size="11.5">natural language / alerts / errors → auto-build → test → evaluate → iterate → promote — HITL-gated, evidence-backed</text>

    <g font-size="11.5" text-anchor="middle">
      <rect x="70"  y="512" width="150" height="46" rx="10" fill="#141c2c" stroke="#2b3a52"/><text x="145" y="533" fill="#e8ecf4" font-weight="600">meta-agent</text><text x="145" y="549" fill="#9aa4bd" font-size="10">emits harness spec</text>
      <rect x="285" y="512" width="150" height="46" rx="10" fill="#141c2c" stroke="#2b3a52"/><text x="360" y="533" fill="#e8ecf4" font-weight="600">harness_ops</text><text x="360" y="549" fill="#9aa4bd" font-size="10">create → READY → invoke</text>
      <rect x="500" y="512" width="150" height="46" rx="10" fill="#141c2c" stroke="#2b3a52"/><text x="575" y="533" fill="#e8ecf4" font-weight="600">llm-judge</text><text x="575" y="549" fill="#9aa4bd" font-size="10">score answer</text>
      <rect x="715" y="512" width="150" height="46" rx="10" fill="#161226" stroke="#5b4a86"/><text x="790" y="533" fill="#d9ccff" font-weight="600">self-improving</text><text x="790" y="549" fill="#9aa4bd" font-size="10">update → v2</text>
      <rect x="930" y="512" width="150" height="46" rx="10" fill="#101d17" stroke="#2f5a3f"/><text x="1005" y="533" fill="#bfead0" font-weight="600">promote</text><text x="1005" y="549" fill="#9aa4bd" font-size="10">CreateHarnessEndpoint</text>
    </g>
    <g stroke-dasharray="7 7">
      <path d="M220 535 H285" stroke="url(#orange)" stroke-width="2.2" fill="none" marker-end="url(#ah)"><animate attributeName="stroke-dashoffset" values="28;0" dur="0.8s" repeatCount="indefinite"/></path>
      <path d="M435 535 H500" stroke="url(#orange)" stroke-width="2.2" fill="none" marker-end="url(#ah)"><animate attributeName="stroke-dashoffset" values="28;0" dur="0.8s" repeatCount="indefinite"/></path>
      <path d="M650 535 H715" stroke="url(#orange)" stroke-width="2.2" fill="none" marker-end="url(#ah)"><animate attributeName="stroke-dashoffset" values="28;0" dur="0.8s" repeatCount="indefinite"/></path>
      <path d="M865 535 H930" stroke="url(#orange)" stroke-width="2.2" fill="none" marker-end="url(#ah)"><animate attributeName="stroke-dashoffset" values="28;0" dur="0.8s" repeatCount="indefinite"/></path>
    </g>
    <path d="M575 512 C575 486 145 486 145 512" stroke="url(#green)" stroke-width="2" fill="none" marker-end="url(#ahg)" stroke-opacity="0.7" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" values="0;28" dur="1.1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- REGISTRY DUAL-GATE -->
  <g>
    <rect x="40" y="600" width="600" height="132" rx="14" fill="#0e1626" stroke="url(#green)" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="60" y="626" fill="#48e08a" font-size="12.5" font-weight="700">REGISTRY DUAL-GATE GOVERNANCE (live-verified)</text>
    <g font-size="11" text-anchor="middle">
      <rect x="60" y="642" width="120" height="44" rx="9" fill="#141c2c" stroke="#2b3a52"/><text x="120" y="662" fill="#e8ecf4" font-weight="600">create record</text><text x="120" y="678" fill="#9aa4bd" font-size="10">AGENT_SKILLS / MCP</text>
      <rect x="230" y="642" width="120" height="44" rx="9" fill="#241c14" stroke="#6b5320"/><text x="290" y="662" fill="#ffd08a" font-weight="700">DRAFT</text><text x="290" y="678" fill="#9aa4bd" font-size="10">not live</text>
      <rect x="400" y="642" width="150" height="44" rx="9" fill="#161226" stroke="#5b4a86"/><text x="475" y="662" fill="#d9ccff" font-weight="700">PENDING_APPROVAL</text><text x="475" y="678" fill="#9aa4bd" font-size="10">submit_for_approval</text>
    </g>
    <text x="60" y="706" fill="#9aa4bd" font-size="10.5">approved ∧ code-mapped ⇒ live · autoApproval=false = the on-account gate · offline mirror in registry.py</text>
    <g stroke-dasharray="6 7">
      <path d="M180 664 H230" stroke="url(#green)" stroke-width="2" fill="none" marker-end="url(#ahg)"><animate attributeName="stroke-dashoffset" values="26;0" dur="0.9s" repeatCount="indefinite"/></path>
      <path d="M350 664 H400" stroke="url(#green)" stroke-width="2" fill="none" marker-end="url(#ahg)"><animate attributeName="stroke-dashoffset" values="26;0" dur="0.9s" repeatCount="indefinite"/></path>
    </g>
  </g>

  <!-- LIVE A2A -->
  <g>
    <rect x="660" y="600" width="580" height="132" rx="14" fill="#0e1626" stroke="url(#cyan)" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="680" y="626" fill="#7bdcff" font-size="12.5" font-weight="700">LIVE A2A ON AGENTCORE RUNTIME (end-to-end, real model)</text>
    <g font-size="10.5" text-anchor="middle">
      <rect x="680" y="642" width="118" height="44" rx="9" fill="#141c2c" stroke="#2b3a52"/><text x="739" y="661" fill="#e8ecf4" font-weight="600">ECR image</text><text x="739" y="677" fill="#9aa4bd" font-size="9.5">arm64 · scan-on-push</text>
      <rect x="828" y="642" width="150" height="44" rx="9" fill="#141c2c" stroke="#2b3a52"/><text x="903" y="661" fill="#e8ecf4" font-weight="600">CreateAgentRuntime</text><text x="903" y="677" fill="#9aa4bd" font-size="9.5">microVM · PUBLIC · A2A</text>
      <rect x="1008" y="642" width="212" height="44" rx="9" fill="#101d31" stroke="#2f4a68"/><text x="1114" y="661" fill="#e8ecf4" font-weight="600">A2A message/send → HTTP 200</text><text x="1114" y="677" fill="#9aa4bd" font-size="9.5">real Bedrock Haiku → CVETriage</text>
    </g>
    <text x="680" y="706" fill="#9aa4bd" font-size="10.5">proven on a non-prod test account, then torn down (billing stopped) · evidence/live_a2a_runtime_result.json</text>
    <g stroke-dasharray="6 7">
      <path d="M798 664 H828" stroke="url(#cyan)" stroke-width="2" fill="none" marker-end="url(#ah)"><animate attributeName="stroke-dashoffset" values="26;0" dur="0.8s" repeatCount="indefinite"/></path>
      <path d="M978 664 H1008" stroke="url(#cyan)" stroke-width="2" fill="none" marker-end="url(#ah)"><animate attributeName="stroke-dashoffset" values="26;0" dur="0.8s" repeatCount="indefinite"/></path>
    </g>
  </g>
</svg>
