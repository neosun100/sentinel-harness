# research-supervisor — declarative harness config
# ==================================================
# Layer 1 (Strategy Iteration) · threat research + synthesis.
#
# A deep-reasoning supervisor that decomposes a research question, delegates to
# specialist tools/agents exposed on the AgentCore Gateway, and synthesizes a
# grounded ResearchDossier. Generic SecOps content only — no org-specific data.
#
# Consumed by sentinel_harness.core.create_harness(). Values referencing ${ENV}
# are resolved by the loader from environment variables (12-factor):
#   SENTINEL_EXECUTION_ROLE_ARN, SENTINEL_REGION, AWS_PROFILE, SENTINEL_GATEWAY_ARN
# and the SENTINEL_MODEL_* overrides consumed by core.py.

harnessName: sentinel_research_supervisor   # must match [a-zA-Z][a-zA-Z0-9_]{0,39} — no hyphens

model:
  bedrockModelConfig:
    # Deep reasoning for research synthesis. Resolved from core.MODEL_OPUS
    # (env SENTINEL_MODEL_OPUS). Cross-region-inference pattern id — OVERRIDABLE:
    # set SENTINEL_MODEL_OPUS to pin a specific version.
    modelId: us.anthropic.claude-opus-4-5-20251101-v1:0
    maxTokens: 8192
    temperature: 0.2

systemPrompt: system_prompt.md   # loader reads this file and wraps it as [{text: ...}]

tools:
  # Policy-backed MCP tool surface. Discovery + specialist delegation + public
  # data lookups (NVD / EPSS / KEV / ATT&CK / egress-controlled web search) all
  # live behind the Gateway. See core.tool_gateway().
  - type: agentcore_gateway
    name: gateway
    config:
      agentCoreGateway:
        gatewayArn: ${SENTINEL_GATEWAY_ARN}

allowedTools:
  # EXPLICIT allowlist — never ['*']. The agent may call only these.
  - "@gateway/search_registry"      # discover specialist agents by capability
  - "@gateway/invoke_specialist"    # deterministic A2A delegation to a specialist
  - "@gateway/nvd_lookup"           # CVE / CVSS lookup
  - "@gateway/epss_kev"             # EPSS score + CISA KEV enrichment
  - "@gateway/attack_lookup"        # MITRE ATT&CK technique lookup
  - "@gateway/web_search"           # egress-controlled web search (text, no download)

memory:
  # Managed memory: SEMANTIC (fact recall across sessions) + SUMMARIZATION
  # (rolling session summary). actorId namespaces isolate per-analyst / per-tenant.
  managedMemoryConfiguration:
    strategies:
      - SEMANTIC
      - SUMMARIZATION
    eventExpiryDuration: 90

maxIterations: 20      # research fan-out + synthesis needs headroom
timeoutSeconds: 300    # stay well under the harness sync ceiling; long jobs go async
