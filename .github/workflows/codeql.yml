name: CodeQL

# Static analysis / code scanning for both languages present in this repo:
#   - python                  : the sentinel_harness library, tools, tests
#   - javascript-typescript   : the AWS CDK app under iac-cdk/
#
# Runs on push to main, on every PR, and on a weekly schedule so newly published
# CodeQL queries catch regressions even without a code change. Token-free: uses
# the default GITHUB_TOKEN with the minimal permissions declared below.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 07:13 UTC (offset from :00 to avoid the cron rush).
    - cron: "13 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload CodeQL results to code scanning
      actions: read            # required by CodeQL on private/internal repos; harmless on public
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript-typescript"]

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Initialize CodeQL
        # github/codeql-action/init v3.37.0
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          language: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        # github/codeql-action/autobuild v3.37.0 (interpreted languages need no build,
        # but autobuild is a no-op that keeps the flow uniform across the matrix)
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze v3.37.0
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          category: "/language:${{ matrix.language }}"
